name: Setup CI
description: Setup CI

runs:
  using: composite

  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
